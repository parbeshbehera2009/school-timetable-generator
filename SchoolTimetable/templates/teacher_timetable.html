<!DOCTYPE html>
<html>

<head>

<title>View Timetable</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    margin:40px;
}

h1{
    color:#1565C0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#1565C0;
    color:white;
}

select{
    padding:8px;
    width:250px;
}

button{
    padding:10px 20px;
    background:#1565C0;
    color:white;
    border:none;
    cursor:pointer;
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<h1>View Timetable</h1>

<form action="/show_teacher_timetable" method="POST">

<select name="teacher_id" required>

    {% for teacher in teachers %}

    <option value="{{ teacher.teacher_id }}">

        {{ teacher.teacher_name }} ({{ teacher.teacher_code }})

    </option>

    {% endfor %}

</select>

<button type="submit">
    View Timetable
</button>

</form>

{% if timetable %}

<table>

<tr>

    <th>Day</th>
    <th>Period</th>
    <th>Class</th>
    <th>Subject</th>

</tr>

{% for row in timetable %}

<tr>

    <td>{{ row.day }}</td>
    <td>{{ row.period }}</td>
    <td>{{ row.class_name }} {{ row.section }}</td>
    <td>{{ row.subject_name }}</td>

</tr>

{% endfor %}

</table>

{% endif %}

<br><br>

<a href="/dashboard">
    <button>Back to Dashboard</button>
</a>

</body>

</html>
