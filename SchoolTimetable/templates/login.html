<!DOCTYPE html>
<html>
<head>
    <title>School Timetable Management System</title>

    <style>

    body{
        font-family:Arial;
        background:#f2f2f2;
    }

    .login-box{

        width:350px;
        margin:120px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0px 0px 10px gray;

    }

    input{

        width:95%;
        padding:10px;
        margin:10px 0;

    }

    button{

        width:100%;
        padding:10px;
        background:#1565C0;
        color:white;
        border:none;
        cursor:pointer;

    }

    h2{

        text-align:center;

    }

    </style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
